<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <form>
    <div class="form-group">
      <label for="language" data-i18n="optionsLanguage">Language:</label>
      <select id="language" name="language">
        <option value="en">English</option>
        <option value="pt_BR">Português (Brasil)</option>
      </select>
      <small data-i18n="optionsLanguageHint">Choose the extension display language</small>
    </div>

    <hr>

    <div class="form-group">
      <label for="llmPreset" data-i18n="optionsActiveAI">Active AI (for Firefox sidebar):</label>
      <select id="llmPreset" name="llmPreset">
        <option value="chatgpt">ChatGPT</option>
        <option value="copilot">Copilot</option>
        <option value="claude">Claude 3.5</option>
        <option value="gemini">Gemini</option>
        <option value="mistral">Mistral Large</option>
        <option value="custom" data-i18n-option="optionsCustom">Custom</option>
      </select>
      <small data-i18n="optionsSelectAI">Select the AI you use in the sidebar</small>
    </div>

    <hr>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" id="autoCopyToClipboard" name="autoCopyToClipboard">
        <span data-i18n="optionsAutoCopy">Automatically copy to clipboard</span>
      </label>
      <small data-i18n="optionsAutoCopyHint">Copies the current page content when navigating between pages</small>
    </div>

    <hr>

    <h3 data-i18n="optionsCharLimits">Character limits per AI</h3>
    <small class="hint" data-i18n="optionsCharLimitsHint">Customize the limits for each AI according to your needs</small>

    <div class="form-group">
      <label for="limitChatgpt">ChatGPT:</label>
      <input type="number" id="limitChatgpt" name="limitChatgpt" min="1000" max="1000000" value="5000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="form-group">
      <label for="limitCopilot">Copilot:</label>
      <input type="number" id="limitCopilot" name="limitCopilot" min="1000" max="1000000" value="3000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="form-group">
      <label for="limitClaude">Claude 3.5:</label>
      <input type="number" id="limitClaude" name="limitClaude" min="1000" max="1000000" value="10000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="form-group">
      <label for="limitGemini">Gemini:</label>
      <input type="number" id="limitGemini" name="limitGemini" min="1000" max="1000000" value="35000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="form-group">
      <label for="limitMistral">Mistral Large:</label>
      <input type="number" id="limitMistral" name="limitMistral" min="1000" max="1000000" value="8000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="form-group">
      <label for="limitCustom" data-i18n="optionsCustom">Custom:</label>
      <input type="number" id="limitCustom" name="limitCustom" min="1000" max="1000000" value="10000">
      <small data-i18n="optionsCharacters">characters</small>
    </div>

    <div class="status" id="saveStatus"></div>
  </form>
  <script src="i18n.js"></script>
  <script src="options.js"></script>
</body>

</html>
